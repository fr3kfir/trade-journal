name: Sync IBKR Trades

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger button in GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch IBKR trades and push to site
        env:
          IBKR_TOKEN:   ${{ secrets.IBKR_TOKEN }}
          IBKR_QUERY_ID: ${{ secrets.IBKR_QUERY_ID }}
          SYNC_SECRET:  ${{ secrets.SYNC_SECRET }}
          SITE_URL:     ${{ secrets.SITE_URL }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, time, os, re, sys

          TOKEN    = os.environ['IBKR_TOKEN']
          QUERY_ID = os.environ['IBKR_QUERY_ID']
          SECRET   = os.environ['SYNC_SECRET']
          SITE_URL = os.environ['SITE_URL']

          def http_get(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return r.read().decode()

          # Step 1 — request report
          print("Requesting IBKR report...")
          resp = http_get(f"https://ndcdyn.interactivebrokers.com/AccountManagement/FlexWebService/SendRequest?t={TOKEN}&q={QUERY_ID}&v=3")
          print("SendRequest response:", resp[:200])

          ref  = re.search(r'<ReferenceCode>(.*?)</ReferenceCode>', resp)
          url  = re.search(r'<Url>(.*?)</Url>', resp)

          if not ref or not url:
              print("ERROR: No reference code. Response:", resp)
              sys.exit(1)

          ref_code = ref.group(1)
          dl_url   = url.group(1)
          print(f"Reference: {ref_code} | URL: {dl_url}")

          # Step 2 — poll for result
          data = None
          for attempt in range(6):
              print(f"Polling attempt {attempt+1}/6...")
              time.sleep(5)
              try:
                  body = http_get(f"{dl_url}?t={TOKEN}&q={ref_code}&v=3")
                  if 'generation in progress' in body.lower() or 'please wait' in body.lower():
                      continue
                  if body.startswith('{') or body.startswith('['):
                      data = json.loads(body)
                      break
                  print("Unexpected response:", body[:200])
              except Exception as e:
                  print(f"Poll error: {e}")

          if not data:
              print("ERROR: Report not ready after 30s")
              sys.exit(1)

          # Step 3 — parse trades
          stmt = (data.get('FlexQueryResponse', {})
                      .get('FlexStatements', {})
                      .get('FlexStatement', {}))
          raw = stmt.get('Trades', {}).get('Trade', [])
          if isinstance(raw, dict): raw = [raw]

          trades = []
          for t in raw:
              if t.get('assetCategory', 'STK') not in ('STK', ''):
                  continue
              dt  = (t.get('dateTime') or '').replace(';', ' ').split(' ')[0]
              qty = float(t.get('quantity') or 0)
              price = float(t.get('tradePrice') or 0)
              sym = t.get('symbol', '')
              if not sym or not dt:
                  continue
              trades.append({
                  'id':         f"ibkr-{sym}-{dt}-{qty}-{price}".replace(' ', ''),
                  'ticker':     sym.upper(),
                  'date':       dt,
                  'direction':  'L' if qty > 0 else 'S',
                  'quantity':   abs(qty),
                  'entry':      price or None,
                  'exit':       None,
                  'stop':       None,
                  'pnl':        float(t.get('netCash') or t.get('netcash') or 0) or None,
                  'commission': float(t.get('commission') or 0) or None,
                  'open_close': t.get('openCloseIndicator', ''),
                  'notes':      'IBKR auto-sync',
              })

          print(f"Parsed {len(trades)} trades")
          if not trades:
              print("No trades found — skipping push")
              sys.exit(0)

          # Step 4 — push to site
          payload = json.dumps({'secret': SECRET, 'trades': trades}).encode()
          req = urllib.request.Request(
              f"{SITE_URL}/api/sync",
              data=payload,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              result = json.loads(r.read())
              print(f"Sync result: {result}")
          PYEOF
