<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#1B2E4B"/>
  <defs>
    <linearGradient id="cg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C896"/>
      <stop offset="100%" stop-color="#00E8A8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- baseline -->
  <line x1="4" y1="26" x2="24" y2="10" stroke="url(#cg)" stroke-width="1" opacity="0.5"/>
  <!-- candle 1 -->
  <line x1="7" y1="20" x2="7" y2="24" stroke="url(#cg)" stroke-width="1"/>
  <rect x="5" y="20" width="4" height="5" rx="0.8" fill="url(#cg)"/>
  <!-- candle 2 -->
  <line x1="14" y1="15" x2="14" y2="19" stroke="url(#cg)" stroke-width="1"/>
  <rect x="12" y="15" width="4" height="6" rx="0.8" fill="url(#cg)"/>
  <!-- candle 3 -->
  <line x1="21" y1="10" x2="21" y2="14" stroke="url(#cg)" stroke-width="1" filter="url(#glow)"/>
  <rect x="19" y="10" width="4" height="7" rx="0.8" fill="url(#cg)" filter="url(#glow)"/>
  <!-- arrow -->
  <line x1="18" y1="15" x2="27" y2="5" stroke="url(#cg)" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="27,5 22,7 25,11" fill="url(#cg)" filter="url(#glow)"/>
</svg>
