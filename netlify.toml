[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[functions.ibkr]
  timeout = 26

[functions.tax-report]
  timeout = 60

[functions.telegram]
  timeout = 30

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
